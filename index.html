<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Google Sheets – Duplicados y CRUD manual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .dashboard-header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 2rem 0; border-radius: 0 0 1rem 1rem; margin-bottom: 2rem; }
        .card-custom { background: white; border-radius: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: none; }
        .stat-number { font-size: 2.5rem; font-weight: 700; }
        .duplicate-badge { background: #dc3545; color: white; border-radius: 50px; padding: 0.2rem 0.8rem; font-size: 0.85rem; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .table-responsive { max-height: 500px; overflow: auto; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .filter-active { background-color: #e7f1ff; }
    </style>
</head>
<body>

<div class="dashboard-header text-center">
    <h1 class="fw-bold"><i class="bi bi-speedometer2"></i> Panel de Control</h1>
    <p class="mb-0 opacity-75">Google Sheets · Duplicados · Editar · Eliminar · Agregar</p>
</div>

<div class="container">
    <div class="toast-container" id="toastContainer"></div>

    <!-- Resumen -->
    <div class="row g-4 mb-4">
        <div class="col-md-3"><div class="card card-custom p-3 text-center"><h6>Filas</h6><div class="stat-number" id="totalRows">-</div></div></div>
        <div class="col-md-3"><div class="card card-custom p-3 text-center"><h6>Columnas</h6><div class="stat-number" id="totalCols">-</div></div></div>
        <div class="col-md-3"><div class="card card-custom p-3 text-center"><h6>Columnas con duplicados</h6><div class="stat-number" id="dupCols">-</div></div></div>
        <div class="col-md-3"><div class="card card-custom p-3 text-center"><h6>Registros duplicados</h6><div class="stat-number" id="totalDupRecords">-</div></div></div>
    </div>

    <!-- Análisis y gráfico -->
    <div class="row g-4 mb-4">
        <div class="col-lg-6">
            <div class="card card-custom p-4">
                <h5><i class="bi bi-search"></i> Analizar columna</h5>
                <select id="columnSelect" class="form-select form-select-lg mb-3"><option value="">-- Selecciona columna --</option></select>
                <div><strong>Valores únicos:</strong> <span id="uniqueCount">-</span></div>
                <div><strong>Valores duplicados:</strong> <span id="dupCount">-</span></div>
                <div id="duplicatesList" class="mt-3"></div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card card-custom p-4">
                <h5><i class="bi bi-bar-chart"></i> Distribución (Top 10)</h5>
                <div class="chart-container"><canvas id="freqChart"></canvas></div>
            </div>
        </div>
    </div>

    <!-- Tabla con filtro -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0"><i class="bi bi-table"></i> Datos</h4>
        <div>
            <input type="text" id="tableFilter" class="form-control form-control-sm" placeholder="Filtrar tabla..." style="width:250px; display:inline-block;">
            <button class="btn btn-outline-secondary btn-sm ms-2" id="clearFilterBtn">Limpiar filtro</button>
            <button class="btn btn-primary btn-sm ms-2" id="addRowBtn"><i class="bi bi-plus-lg"></i> Agregar fila</button>
        </div>
    </div>
    <div class="card card-custom p-4">
        <div class="table-responsive" id="dataTableContainer">Cargando...</div>
    </div>
</div>

<!-- Modal para agregar/editar -->
<div class="modal fade" id="rowModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Agregar fila</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="saveRowBtn">Guardar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function() {
        // 🔗 URL de tu Apps Script ya configurada
        const API_URL = 'https://script.google.com/macros/s/AKfycbwur6-Z0JCJRRvmjriHakIODxs-8ZjcrvNKsl2RbJIpIJ0blksb981SDn7SApLfL8sanQ/exec';

        let fullData = [];
        let headers = [];
        let currentChart = null;
        let editingRowIndex = null;
        let activeFilter = '';

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const bg = type === 'error' ? 'bg-danger' : 'bg-success';
            const html = `<div class="toast align-items-center text-white ${bg} border-0 show" role="alert"><div class="d-flex"><div class="toast-body">${msg}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
            container.insertAdjacentHTML('beforeend', html);
            const el = container.lastElementChild;
            const toast = new bootstrap.Toast(el, { delay: 3000 });
            toast.show();
            el.addEventListener('hidden.bs.toast', () => el.remove());
        }

        async function apiCall(action, method = 'GET', body = null, params = '') {
            let url = API_URL + '?action=' + action + (params ? '&' + params : '');
            let options = { method };
            if (body) {
                options.body = JSON.stringify(body);
                options.headers = { 'Content-Type': 'application/json' };
            }
            const resp = await fetch(url, options);
            return await resp.json();
        }

        async function loadData() {
            try {
                const data = await apiCall('read');
                fullData = data;
                headers = fullData.length ? Object.keys(fullData[0]).filter(k => k !== '_rowIndex') : [];
                updateSummary();
                populateColumnSelect();
                renderTable();
                document.getElementById('columnSelect').dispatchEvent(new Event('change'));
                showToast('Datos cargados', 'success');
            } catch (e) {
                console.error(e);
                showToast('Error al cargar. Verifica API y permisos.', 'error');
            }
        }

        function updateSummary() {
            document.getElementById('totalRows').textContent = fullData.length;
            document.getElementById('totalCols').textContent = headers.length;
            let dupCols = 0, totalDup = 0;
            headers.forEach(h => {
                const vals = fullData.map(r => r[h]);
                const freq = {};
                vals.forEach(v => freq[v] = (freq[v] || 0) + 1);
                const dupes = Object.values(freq).filter(c => c > 1);
                if (dupes.length) { dupCols++; totalDup += dupes.reduce((a,b) => a+b, 0); }
            });
            document.getElementById('dupCols').textContent = dupCols;
            document.getElementById('totalDupRecords').textContent = totalDup;
        }

        function populateColumnSelect() {
            const sel = document.getElementById('columnSelect');
            sel.innerHTML = '<option value="">-- Selecciona columna --</option>';
            headers.forEach(h => sel.innerHTML += `<option value="${h}">${h}</option>`);
        }

        function analyzeColumn(columnName) {
            if (!columnName) return;
            const values = fullData.map(r => r[columnName]);
            const freq = {};
            values.forEach(v => freq[v] = (freq[v] || 0) + 1);
            const duplicates = Object.entries(freq).filter(([,c]) => c > 1);
            document.getElementById('uniqueCount').textContent = Object.keys(freq).length;
            document.getElementById('dupCount').textContent = duplicates.length || '0 (sin duplicados)';

            let listHtml = '';
            if (duplicates.length === 0) {
                listHtml = '<div class="alert alert-success">✅ No hay duplicados en esta columna.</div>';
            } else {
                listHtml = '<h6>🔁 Valores repetidos:</h6><ul class="list-group">';
                duplicates.sort((a,b) => b[1] - a[1]).forEach(([val, count]) => {
                    listHtml += `
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span>${val.length > 40 ? val.slice(0,40)+'…' : val} <span class="duplicate-badge ms-2">${count} apariciones</span></span>
                        <button class="btn btn-sm btn-outline-primary filter-table-btn" data-column="${columnName}" data-value="${val.replace(/"/g, '&quot;')}">
                            <i class="bi bi-funnel"></i> Filtrar tabla
                        </button>
                    </li>`;
                });
                listHtml += '</ul>';
            }
            document.getElementById('duplicatesList').innerHTML = listHtml;

            // Eventos para filtrar la tabla
            document.querySelectorAll('.filter-table-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const col = this.dataset.column;
                    const val = this.dataset.value;
                    applyFilter(col, val);
                });
            });

            renderChart(freq, columnName);
        }

        function renderChart(freq, colName) {
            if (currentChart) currentChart.destroy();
            const sorted = Object.entries(freq).sort((a,b) => b[1] - a[1]).slice(0,10);
            if (!sorted.length) return;
            const labels = sorted.map(([v]) => v.length > 20 ? v.slice(0,20)+'…' : v);
            const data = sorted.map(([,c]) => c);
            const ctx = document.getElementById('freqChart').getContext('2d');
            currentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: `Frecuencia en "${colName}"`,
                        data,
                        backgroundColor: 'rgba(42,82,152,0.7)',
                        borderColor: '#2a5298',
                        borderWidth: 1
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
            });
        }

        function applyFilter(column, value) {
            activeFilter = `${column}=${value}`;
            document.getElementById('tableFilter').value = `${column}: ${value}`;
            renderTable();
            document.getElementById('dataTableContainer').classList.add('filter-active');
        }

        function clearFilter() {
            activeFilter = '';
            document.getElementById('tableFilter').value = '';
            document.getElementById('dataTableContainer').classList.remove('filter-active');
            renderTable();
        }

        function renderTable() {
            const container = document.getElementById('dataTableContainer');
            let filteredData = fullData;
            if (activeFilter) {
                const [col, val] = activeFilter.split('=');
                filteredData = fullData.filter(row => row[col] == val);
            }
            // Filtro por texto general (busca en cualquier columna)
            const textFilter = document.getElementById('tableFilter').value.trim();
            if (!activeFilter && textFilter) {
                filteredData = fullData.filter(row => 
                    headers.some(h => String(row[h]).toLowerCase().includes(textFilter.toLowerCase()))
                );
            }
            if (filteredData.length === 0) {
                container.innerHTML = '<p class="text-muted">Sin datos para mostrar.</p>';
                return;
            }
            let html = '<table class="table table-striped table-hover"><thead><tr>';
            headers.forEach(h => html += `<th>${h}</th>`);
            html += '<th style="width:100px">Acciones</th></tr></thead><tbody>';
            filteredData.forEach(row => {
                html += '<tr>';
                headers.forEach(h => html += `<td>${row[h] !== undefined ? row[h] : ''}</td>`);
                html += `<td>
                    <button class="btn btn-sm btn-outline-warning edit-btn me-1" data-index="${row._rowIndex}" title="Editar"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-outline-danger delete-btn" data-index="${row._rowIndex}" title="Eliminar"><i class="bi bi-trash"></i></button>
                </td></tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
            // Eventos editar/eliminar
            document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => openEditModal(parseInt(btn.dataset.index))));
            document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => deleteRow(parseInt(btn.dataset.index))));
        }

        async function deleteRow(rowIndex) {
            if (!confirm('¿Eliminar esta fila permanentemente?')) return;
            const res = await apiCall('delete', 'POST', null, `row=${rowIndex}`);
            if (res.success) {
                showToast('Fila eliminada');
                await loadData();
            } else {
                showToast('Error al eliminar: ' + (res.error || ''), 'error');
            }
        }

        function openEditModal(rowIndex) {
            const row = fullData.find(r => r._rowIndex === rowIndex);
            if (!row) return;
            editingRowIndex = rowIndex;
            document.getElementById('modalTitle').textContent = 'Editar fila';
            let formHtml = '';
            headers.forEach(h => {
                formHtml += `<div class="mb-3"><label class="form-label">${h}</label><input type="text" class="form-control" name="${h}" value="${row[h] || ''}"></div>`;
            });
            document.getElementById('modalBody').innerHTML = formHtml;
            const modal = new bootstrap.Modal(document.getElementById('rowModal'));
            modal.show();
        }

        async function saveRow() {
            const inputs = document.querySelectorAll('#modalBody input');
            const rowData = {};
            inputs.forEach(inp => rowData[inp.name] = inp.value);
            let res;
            if (editingRowIndex) {
                res = await apiCall('update', 'POST', { rowIndex: editingRowIndex, data: rowData });
            } else {
                res = await apiCall('add', 'POST', rowData);
            }
            if (res.success) {
                showToast(editingRowIndex ? 'Fila actualizada' : 'Fila agregada');
                bootstrap.Modal.getInstance(document.getElementById('rowModal')).hide();
                editingRowIndex = null;
                await loadData();
            } else {
                showToast('Error: ' + (res.error || 'Fallo'), 'error');
            }
        }

        // Eventos principales
        document.getElementById('columnSelect').addEventListener('change', e => analyzeColumn(e.target.value));
        document.getElementById('addRowBtn').addEventListener('click', () => {
            editingRowIndex = null;
            document.getElementById('modalTitle').textContent = 'Agregar nueva fila';
            let formHtml = '';
            headers.forEach(h => formHtml += `<div class="mb-3"><label class="form-label">${h}</label><input type="text" class="form-control" name="${h}" value=""></div>`);
            document.getElementById('modalBody').innerHTML = formHtml;
            new bootstrap.Modal(document.getElementById('rowModal')).show();
        });
        document.getElementById('saveRowBtn').addEventListener('click', saveRow);
        document.getElementById('clearFilterBtn').addEventListener('click', clearFilter);
        document.getElementById('tableFilter').addEventListener('input', function() {
            if (activeFilter && this.value !== `${activeFilter.split('=')[0]}: ${activeFilter.split('=')[1]}`) clearFilter();
            else if (!activeFilter) renderTable();
        });

        // Inicializar
        loadData();
    })();
</script>
</body>
</html>
